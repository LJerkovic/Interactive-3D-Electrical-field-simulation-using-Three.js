<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Electric Field Visualizer</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div id="app"></div>
    <aside class="ui-panel" id="ui-panel">
      <h1>Charges</h1>
      <label for="charge-value">Charge value</label>
      <input id="charge-value" type="number" step="0.1" value="2">
      <label for="charge-x">Position X</label>
      <input id="charge-x" type="number" step="0.5" value="0">
      <label for="charge-y">Position Y</label>
      <input id="charge-y" type="number" step="0.5" value="0">
      <label for="charge-z">Position Z</label>
      <input id="charge-z" type="number" step="0.5" value="0">
      <label for="field-spacing">Field density</label>
      <div class="slider-row">
    <input id="field-spacing" type="range" min="0.75" max="2.5" step="0.25" value="1.25">
        <span class="slider-value" id="field-spacing-value">1.0</span>
      </div>
      <details class="advanced-settings">
        <summary>Advanced settings</summary>
        <div class="slider-row">
          <button class="toggle-button" id="fade-toggle" type="button">Fade: On</button>
          <span class="slider-value" id="fade-strength-value">1.0</span>
        </div>
        <label for="fade-strength">Fade strength</label>
        <div class="slider-row">
          <input id="fade-strength" type="range" min="0" max="1" step="0.2" value="1">
        </div>
        <div class="slider-row">
          <button class="toggle-button" id="cull-toggle" type="button">Cull far: Off</button>
        </div>
        <label for="cull-distance">Cull distance</label>
        <div class="slider-row">
          <input id="cull-distance" type="range" min="4" max="20" step="1" value="8">
          <span class="slider-value" id="cull-distance-value">8</span>
        </div>
      </details>
      <button id="add-charge">Add charge</button>
      <div class="charge-list" id="charge-list"></div>
      <div class="hint">Positive values emit field lines, negative values attract them.</div>
    </aside>
    <script type="module" src="/main.js"></script>
  </body>
</html>
